plugins {
    id 'application'
}

group = 'com.kyleengler'
version = '1.0'

application {
    mainClass = 'com.kyleengler.commonwealthsavers.AccountManager'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Main-Class': 'com.kyleengler.commonwealthsavers.AccountManager'
    }
}